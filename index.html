<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistral Mart</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1120;
            color: white;
        }

        header {
            background: #111827;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #8b5cf6;
        }

        nav {
            margin-top: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            margin: 40px auto;
        }

        .card {
            background: #111827;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #312e81;
        }

        .price {
            color: #22c55e;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Mistral Mart</h1>

    <nav>
        <a href="/">Home</a>
        <a href="/cars">Cars</a>
        <a href="/houses">Houses</a>
        <a href="/profile">Profile</a>
    </nav>
</header>

<div class="container">

    <div class="card">
        <h2>BMW X5 2021</h2>
        <div class="price">18 900 000 ₸</div>
        <p>Shymkent • Full drive</p>
    </div>

    <div class="card">
        <h2>2-room Apartment</h2>
        <div class="price">38 000 000 ₸</div>
        <p>Astana • 65 m² • New building</p>
    </div>

</div>

</body>
</html>
