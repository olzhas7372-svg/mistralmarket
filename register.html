<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Mistral Mart</title>
</head>
<body style="margin:0; background:#0b1120; color:white; font-family:Arial;">

<div style="width:400px; margin:120px auto; background:#111827; padding:40px; border-radius:20px; text-align:center;">

    <h1 style="color:#8b5cf6;">Mistral Mart</h1>
    <h2>Registration</h2>

    <form action="/register" method="POST">

        <input 
            type="text"
            name="username"
            placeholder="Username"
            required
            style="width:100%; padding:14px; margin:10px 0; border:none; border-radius:10px;"
        >

        <input 
            type="email"
            name="email"
            placeholder="Email"
            required
            style="width:100%; padding:14px; margin:10px 0; border:none; border-radius:10px;"
        >

        <input 
            type="password"
            name="password"
            placeholder="Password"
            required
            style="width:100%; padding:14px; margin:10px 0; border:none; border-radius:10px;"
        >

        <button
            type="submit"
            style="width:100%; padding:14px; background:#22c55e; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;"
        >
            Register
        </button>

    </form>

</div>

</body>
</html>
